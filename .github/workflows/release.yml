name: Release

# Builds the Immolate searcher for Linux and Windows and packages two mod bundles:
#   - CrystalBall-windows.zip       drop-in: mod + Immolate/Immolate.exe (no watcher)
#   - CrystalBall-linux-proton.zip  mod + Immolate/Immolate + watcher.py + launch.sh
# Every commit/PR builds + packages the bundles as workflow artifacts; pushing a
# tag like v0.1.0 additionally publishes them as a GitHub Release.

on:
  push:
    branches: ["**"] # build + package on every commit (artifacts only)
    tags: ["v*"] # tags additionally publish a GitHub Release
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenCL (ICD loader + headers)
        run: sudo apt-get update && sudo apt-get install -y ocl-icd-opencl-dev opencl-headers

      - name: Build Immolate
        run: |
          cmake -S Immolate -B Immolate/build -DCMAKE_BUILD_TYPE=Release
          cmake --build Immolate/build --config Release

      - name: Assemble Linux/Proton bundle
        run: |
          set -eux
          out=dist/CrystalBall
          mkdir -p "$out/Immolate"
          # Mod files (Lua UI + handshake) and the Linux/Proton runtime glue.
          cp CrystalBall.json README.md "$out/"
          cp -r CrystalBall "$out/CrystalBall"
          # Searcher: binary + the .cl kernels it loads relative to its own dir.
          cp Immolate/build/Immolate "$out/Immolate/"
          cp Immolate/search.cl "$out/Immolate/"
          cp -r Immolate/filters Immolate/lib "$out/Immolate/"
          chmod +x "$out/Immolate/Immolate" "$out/CrystalBall/linux/launch.sh"
          (cd dist && zip -r ../CrystalBall-linux-proton.zip CrystalBall)

      - uses: actions/upload-artifact@v4
        with:
          name: CrystalBall-linux-proton
          path: CrystalBall-linux-proton.zip

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenCL (vcpkg)
        run: vcpkg install opencl:x64-windows

      - name: Build Immolate.exe
        run: |
          cmake -S Immolate -B Immolate/build `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows
          cmake --build Immolate/build --config Release

      - name: Assemble Windows bundle
        shell: pwsh
        run: |
          $out = "dist/CrystalBall"
          New-Item -ItemType Directory -Force -Path "$out/Immolate" | Out-Null
          # Mod files only - no watcher.py, no launch.sh (drop-in).
          Copy-Item CrystalBall.json, README.md "$out/"
          Copy-Item -Recurse CrystalBall "$out/CrystalBall"
          # Searcher: binary + the .cl kernels it loads relative to its own dir.
          Copy-Item Immolate/build/Release/Immolate.exe "$out/Immolate/"
          Copy-Item Immolate/search.cl "$out/Immolate/"
          Copy-Item -Recurse Immolate/filters, Immolate/lib "$out/Immolate/"
          Compress-Archive -Path "$out" -DestinationPath CrystalBall-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: CrystalBall-windows
          path: CrystalBall-windows.zip

  release:
    needs: [linux, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write # create the release + upload assets
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.zip
          generate_release_notes: true
